name: Publish to PyPI

on:
  push:
    branches: [master]
    paths:
      - 'pyproject.toml' # 监听版本号变更触发发布

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # 必须：用于 PyPI Trusted Publisher 免密发布
      contents: write  # 必须：用于自动创建 Tag 和 GitHub Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 对齐 pyproject.toml 的最低要求
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 2. 安装 Poetry
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      # 3. 增加缓存层：大幅提升依赖安装速度
      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      # 4. 优化依赖安装指令
      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        # 使用 --all-extras 替代手动指定所有 extras 包，更简洁且不易漏
        run: poetry install --all-extras --with dev --no-interaction

      # 5. 运行测试
      - name: Run tests
        # 去掉 python -m 以更原生的方式运行 pytest
        run: poetry run pytest tests/ -v --tb=short

      # 6. 读取版本和描述信息
      - name: Read metadata from pyproject.toml
        id: metadata
        run: |
          # 获取短版本号
          VERSION=$(poetry version --short)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      # 7. 版本防碰撞检查
      - name: Check if version tag exists
        run: |
          VERSION="${{ steps.metadata.outputs.version }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "❌ 版本 v$VERSION 已存在，请更新 pyproject.toml 中的版本号再提交"
            exit 1
          fi
          echo "✅ 版本 v$VERSION 可以发布"

      # 8. 构建并发布包
      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      # 9. 自动打 Tag
      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.metadata.outputs.version }}" -m "Release v${{ steps.metadata.outputs.version }}"
          git push origin "v${{ steps.metadata.outputs.version }}"

      # 10. 创建 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.metadata.outputs.version }}"
          name: "Pancake Framework v${{ steps.metadata.outputs.version }}"
          files: dist/*
          generate_release_notes: true
          body: |
            ## Pancake Framework v${{ steps.metadata.outputs.version }}
            
            🚀 **Decorator-driven Python web framework with IoC, MyBatis ORM, and AI workflow**

            ### Install
            
            **Standard Installation:**
            ```bash
            pip install pancake_framework
            ```
            
            **Install with all plugins (Web, AI, Redis, etc.):**
            ```bash
            pip install "pancake_framework[all]"
            ```

            ### Features
            - Decorator-driven Python web framework with zero-import design
            - IoC Container (Singleton / Transient / Scoped)
            - MyBatis Plus ORM: BaseMapper CRUD, chain queries, pagination, dynamic SQL
            - FastAPI Web: all HTTP methods, auth, middleware, validation, transaction
            - AI Module: OpenAI / DeepSeek / Gemini / Ollama / GLM / Moonshot / Qwen
            - Short-term & Long-term memory, RAG
            - Redis Cache with anti-penetration/avalanche/breakdown protection
            - Message Queue: SimpleBroker / RedisBroker
            - Lifecycle Management, Remote Calls (HTTP/gRPC)
            - CUI (Click) and GUI (Flet/Flutter) support
            - CLI tool: `pancake create/run/check/build`

            [Full Documentation](https://github.com/Drayee/PancakeFramework#readme)