name: Publish to PyPI

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: poetry install --extras "all" --with dev --no-interaction

      - name: Run tests
        run: poetry run python -m pytest tests/ -v --tb=short

      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(poetry version -s)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          files: dist/*
          generate_release_notes: true
          body: |
            ## ${{ steps.version.outputs.version }}

            ### Features
            - Decorator-driven Python web framework with zero-import design
            - IoC Container (Singleton / Transient / Scoped)
            - MyBatis Plus ORM: BaseMapper CRUD, chain queries, pagination, dynamic SQL
            - FastAPI Web: all HTTP methods, auth, middleware, validation, transaction
            - AI Module: OpenAI / DeepSeek / Gemini / Ollama / GLM / Moonshot / Qwen
            - Short-term & Long-term memory, RAG
            - Redis Cache with anti-penetration/avalanche/breakdown protection
            - Message Queue: SimpleBroker / RedisBroker
            - Lifecycle Management, Remote Calls (HTTP/gRPC)
            - CUI (Click) and GUI (Flet/Flutter) support
            - CLI tool: `pancake create/run/check/build`

            ### Install
            ```bash
            pip install pancake_framework
            ```

            [Full Documentation](https://github.com/Drayee/PancakeFramework#readme)
