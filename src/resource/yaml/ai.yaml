# AI 模块配置
# 所有配置项都有默认值，只需配置 api_key 即可使用
# 环境变量用 ${VAR_NAME} 引用

ai:
  default_model: deepseek

  providers:
    deepseek:
      type: openai
      base_url: https://api.deepseek.com
      api_key: ${DEEPSEEK_API_KEY}
      model: deepseek-chat
      max_tokens: 4096
      temperature: 0.7
      timeout: 60
      retry: 3

    # 取消注释以启用其他模型
    # openai:
    #   type: openai
    #   base_url: https://api.openai.com/v1
    #   api_key: ${OPENAI_API_KEY}
    #   model: gpt-4o
    #   max_tokens: 4096
    #   temperature: 0.7

    # gemini:
    #   type: google
    #   api_key: ${GOOGLE_API_KEY}
    #   model: gemini-2.0-flash
    #   max_tokens: 4096
    #   temperature: 0.7

    # ollama:
    #   type: ollama
    #   base_url: http://localhost:11434
    #   model: llama3
    #   max_tokens: 4096

    # zhipu:
    #   type: openai
    #   base_url: https://open.bigmodel.cn/api/paas/v4
    #   api_key: ${ZHIPU_API_KEY}
    #   model: glm-4

    # moonshot:
    #   type: openai
    #   base_url: https://api.moonshot.cn/v1
    #   api_key: ${MOONSHOT_API_KEY}
    #   model: moonshot-v1-8k

    # qwen:
    #   type: openai
    #   base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    #   api_key: ${DASHSCOPE_API_KEY}
    #   model: qwen-turbo

  memory:
    short_term:
      strategy: sliding_window    # sliding_window 或 token_limit
      max_messages: 20
      max_tokens: 4000
      summary_on_overflow: false
      summary_model: deepseek

    long_term:
      backend: sqlite             # sqlite 或 redis
      ttl: 0                      # 0=永不过期
      namespace: default
      sqlite_path: resource/db/memory.db
      # redis_url: redis://localhost:6379
      # redis_db: 0

  rag:
    collection: pancake_docs
    embedding_provider: deepseek
    embedding_model: text-embedding-3-small
    chunk_size: 500
    chunk_overlap: 50
    top_k: 5
    persist_dir: resource/db/chroma
